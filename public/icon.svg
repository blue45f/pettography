<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Pettography">
  <defs>
    <!-- Vibrant, premium gradient for rare exotic pets (emerald green to bright mint & teal) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#065f46" flood-opacity="0.25" />
    </filter>
  </defs>
  <!-- Background Card -->
  <rect width="256" height="256" rx="64" fill="url(#bg)" />
  
  <!-- Minimalist, premium stylized Chameleon / Lizard illustration -->
  <g transform="translate(48, 48) scale(1.0)" filter="url(#shadow)">
    <!-- Branch at the bottom -->
    <path d="M 10 130 L 150 130 M 110 130 L 125 142" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
    <path d="M 25 130 C 25 118, 35 112, 40 120" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9" />

    <!-- Body curve (curling tail and back) -->
    <path d="M 80 130 C 40 130, 20 100, 20 70 C 20 30, 50 10, 90 10 C 130 10, 140 40, 140 60 C 140 80, 120 90, 110 80 C 100 70, 100 60, 110 55 C 115 50, 122 52, 122 60 C 122 70, 105 100, 80 100 C 60 100, 50 85, 50 70 C 50 45, 70 32, 90 32 C 110 32, 118 40, 118 45" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Outer spiral (tail) -->
    <path d="M 80 130 C 105 130, 130 110, 130 70 C 130 30, 100 2, 65 2 C 25 2, 5 25, 5 50 C 5 65, 15 75, 25 75 C 35 75, 40 65, 37 55 C 34 45, 43 30, 65 30 C 87 30, 105 45, 105 70 C 105 90, 90 102, 80 102 C 70 102, 60 95, 60 85 C 60 75, 70 70, 80 70" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" />
    
    <!-- Crown / Crest of chameleon -->
    <path d="M 90 10 C 85 2, 75 -2, 65 1 C 55 4, 52 12, 60 18" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
    
    <!-- Big cute eye -->
    <circle cx="90" cy="45" r="14" fill="#ffffff" />
    <circle cx="92" cy="43" r="7" fill="#059669" />
    <circle cx="95" cy="40" r="3" fill="#ffffff" />
  </g>
</svg>
