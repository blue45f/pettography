      <stop stop-color="#4f46e5" />
      <stop offset="0.58" stop-color="#7c3aed" />
      <stop offset="1" stop-color="#f43f5e" />
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#bgFull)" />
  <g transform="translate(25.6 25.6) scale(0.8)">
    <rect x="10" y="10" width="236" height="236" rx="50" fill="url(#bg)" />
    <rect x="35" y="48" width="186" height="150" rx="26" fill="#ffffff" stroke="#c7d2fe" stroke-width="8" />
