<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Pettography">
  <!-- Maskable/apple-touch source: icon.svg 아트를 0.8 스케일로 중앙 배치(상하좌우 10%씩, 총 20% 세이프존 패딩)하고
       전체 캔버스를 동일 bg 그라디언트로 풀블리드 — 원형 마스크/iOS 라운딩에도 잘림·투명 모서리가 없다.
       icon-maskable-512.png / apple-touch-icon.png 는 이 파일을 래스터한 결과물. -->
  <defs>
    <linearGradient id="bgFull" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eef2ff" />
      <stop offset="0.55" stop-color="#fff7ed" />
      <stop offset="1" stop-color="#ffe4e6" />
    </linearGradient>
    <linearGradient id="bg" x1="28" y1="18" x2="230" y2="238" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eef2ff" />
      <stop offset="0.55" stop-color="#fff7ed" />
      <stop offset="1" stop-color="#ffe4e6" />
    </linearGradient>
