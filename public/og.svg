<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Pettography">
  <defs>
    <!-- Page background: light tinted neutral with soft hero gradient (gradient-hero) -->
    <radialGradient id="heroA" cx="0%" cy="0%" r="95%">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.18" />
      <stop offset="0.6" stop-color="#10b981" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="heroB" cx="100%" cy="0%" r="80%">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.15" />
      <stop offset="0.65" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>
    <!-- Brand gradient (gradient-brand) -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#059669" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <!-- Logo tile background (matches icon.svg bg) -->
    <linearGradient id="tileBg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#059669" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#065f46" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Base surface -->
  <rect width="1200" height="630" fill="#fafafa" />
  <rect width="1200" height="630" fill="url(#heroA)" />
  <rect width="1200" height="630" fill="url(#heroB)" />

  <!-- Brand accent bar bottom -->
  <rect x="0" y="618" width="1200" height="12" fill="url(#brand)" />

  <!-- Logo mark: premium chameleon tile (matches icon.svg) -->
  <g transform="translate(90 198)" filter="url(#shadow)">
    <rect x="0" y="0" width="236" height="236" rx="58" fill="url(#tileBg)" />
    <!-- Embedded chameleon paths from icon.svg (scaled) -->
    <g transform="translate(42 42) scale(0.6)">
      <!-- Branch at the bottom -->
      <path d="M 10 130 L 150 130 M 110 130 L 125 142" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
      <path d="M 25 130 C 25 118, 35 112, 40 120" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9" />

      <!-- Body curve (curling tail and back) -->
      <path d="M 80 130 C 40 130, 20 100, 20 70 C 20 30, 50 10, 90 10 C 130 10, 140 40, 140 60 C 140 80, 120 90, 110 80 C 100 70, 100 60, 110 55 C 115 50, 122 52, 122 60 C 122 70, 105 100, 80 100 C 60 100, 50 85, 50 70 C 50 45, 70 32, 90 32 C 110 32, 118 40, 118 45" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
      
      <!-- Outer spiral (tail) -->
      <path d="M 80 130 C 105 130, 130 110, 130 70 C 130 30, 100 2, 65 2 C 25 2, 5 25, 5 50 C 5 65, 15 75, 25 75 C 35 75, 40 65, 37 55 C 34 45, 43 30, 65 30 C 87 30, 105 45, 105 70 C 105 90, 90 102, 80 102 C 70 102, 60 95, 60 85 C 60 75, 70 70, 80 70" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" />
      
      <!-- Crown / Crest of chameleon -->
      <path d="M 90 10 C 85 2, 75 -2, 65 1 C 55 4, 52 12, 60 18" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
      
      <!-- Big cute eye -->
      <circle cx="90" cy="45" r="14" fill="#ffffff" />
      <circle cx="92" cy="43" r="7" fill="#059669" />
      <circle cx="95" cy="40" r="3" fill="#ffffff" />
    </g>
  </g>

  <!-- Wordmark + tagline -->
  <g font-family="'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="384" y="278" font-size="78" font-weight="800" letter-spacing="-1.5" fill="#0f172a">Pettography</text>
    <text x="386" y="338" font-size="31" font-weight="600" fill="#10b981">희귀 애완동물 라이프사이클 포탈</text>
    <text x="386" y="388" font-size="25" font-weight="400" fill="#475569">종 선택 · 입양 · 사육 · 의료 · 일상 · 장례</text>
    <text x="386" y="424" font-size="25" font-weight="400" fill="#475569">파충류 · 조류 · 특수동물, 한 곳에서 시작하세요</text>
  </g>

  <!-- Category chips -->
  <g font-family="'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600">
    <g>
      <rect x="386" y="460" width="120" height="48" rx="24" fill="#ecfdf5" />
      <text x="446" y="491" fill="#047857" text-anchor="middle">🦎 파충류</text>
    </g>
    <g>
      <rect x="518" y="460" width="108" height="48" rx="24" fill="#ecfeff" />
      <text x="572" y="491" fill="#0891b2" text-anchor="middle">🐦 조류</text>
    </g>
    <g>
      <rect x="638" y="460" width="146" height="48" rx="24" fill="#f8fafc" />
      <text x="711" y="491" fill="#475569" text-anchor="middle">🕷️ 특수동물</text>
    </g>
  </g>
</svg>
