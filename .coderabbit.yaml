language: ko-KR
early_access: false
reviews:
  profile: chill
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - '!**/dist/**'
    - '!**/node_modules/**'
    - '!**/*.lock'
    - '!**/pnpm-lock.yaml'
    - '!**/.claude/**'
  path_instructions:
    - path: 'src/domains/**/*.ts'
      instructions: |
        Zustand persist 스토어와 Zod schema를 함께 검토하세요.
        - localStorage 키 변경 시 마이그레이션 함수 존재 여부를 확인하세요.
        - schema에 nullable/optional이 어떻게 다뤄지는지 점검하세요.
    - path: 'src/pages/**/*.tsx'
      instructions: |
        React 19 + React Compiler 기준이라 useMemo/useCallback 남용은 피합니다.
        - impure 함수(Date.now 등) 호출은 useMemo 밖으로 빼야 합니다.
        - DESIGN.md 금지 패턴(side-stripe border, gradient text, decorative glass, em dash) 위반 여부를 검토하세요.
    - path: 'src/i18n/locales/**/*.json'
      instructions: |
        ko/en 키 parity가 깨지지 않았는지 확인하고, 한쪽에만 추가된 키가 있으면 지적하세요.
    - path: 'backend/**/*.ts'
      instructions: |
        NestJS 11 + class-validator 패턴을 따르는지 확인하세요. 새 controller는 spec 동반.
chat:
  auto_reply: true
