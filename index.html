<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- theme-color: 브랜드 primary(--color-primary-600) / 다크는 --color-background(#0b1120). global.css 토큰과 동기. -->
    <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b1120" media="(prefers-color-scheme: dark)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pettography" />

    <!-- Pretendard Variable (한글 가변 폰트) — dynamic subset: 화면에 쓰인 글자의 unicode-range
         조각만 내려받는다(font-display: swap). 미로드 시 global.css --font-family 시스템 폴백. -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />

    <title>Pettography · 희귀 애완동물 라이프사이클 포탈</title>
    <meta
      name="description"
      content="희귀 애완동물 종 선택부터 입양·사육·의료·일상·장례까지, 한 번의 선택으로 세팅하는 위치 기반 포탈."
    />
    <link rel="canonical" href="https://pettography.vercel.app/" />

    <!-- Open Graph (Facebook/Kakao/etc). usePageMeta(src/hooks)가 라우트별로 og:title/description/url 을 덮어쓴다. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pettography" />
    <meta property="og:title" content="Pettography · 희귀 애완동물 라이프사이클 포탈" />
    <meta
      property="og:description"
      content="희귀 애완동물 종 선택부터 입양·사육·의료·일상·장례까지, 한 번의 선택으로 세팅하는 위치 기반 포탈."
    />
    <meta property="og:url" content="https://pettography.vercel.app/" />
    <meta property="og:image" content="https://pettography.vercel.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Pettography — 희귀 애완동물 라이프사이클 포탈" />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pettography · 희귀 애완동물 라이프사이클 포탈" />
    <meta
      name="twitter:description"
      content="희귀 애완동물 종 선택부터 입양·사육·의료·일상·장례까지, 한 번의 선택으로 세팅하는 위치 기반 포탈."
    />
    <meta name="twitter:image" content="https://pettography.vercel.app/og.png" />

    <!-- No-FOUC theme bootstrap: 페인트 전에 data-theme 을 확정해 다크모드 첫 진입 깜빡임을 막는다.
         저장 형식은 zustand persist 키 'app-store'({state:{theme}})와 일치 (src/hooks/useTheme.ts 참고). -->
    <script>
      ;(function () {
        try {
          var theme = null
          var raw = localStorage.getItem('app-store')
          if (raw) {
            var parsed = JSON.parse(raw)
            var stored = parsed && parsed.state && parsed.state.theme
            if (stored === 'light' || stored === 'dark') theme = stored
          }
          if (!theme) {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          document.documentElement.dataset.theme = theme
        } catch (e) {
          /* localStorage 접근 불가 등 — 기본 라이트 테마로 폴백 */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
