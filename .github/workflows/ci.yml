name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify

  backend:
    name: Backend verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify

  coderabbit-review:
    name: CodeRabbit review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      pull-requests: read
      checks: read
    steps:
      - name: Wait for CodeRabbit review to land on the head SHA
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER)
            const sha = process.env.PR_SHA
            const owner = context.repo.owner
            const repo = context.repo.repo
            const timeoutMs = 20 * 60 * 1000
            const intervalMs = 30 * 1000
            const started = Date.now()

            async function findReview() {
              const { data } = await github.rest.pulls.listReviews({
                owner,
                repo,
                pull_number: prNumber,
              })
              return data.find((r) => {
                const login = (r.user?.login ?? '').toLowerCase()
                return login.startsWith('coderabbit') && r.commit_id === sha
              })
            }

            while (Date.now() - started < timeoutMs) {
              const review = await findReview()
              if (review) {
                core.info(`CodeRabbit review ${review.id} state=${review.state}`)
                if (review.state === 'CHANGES_REQUESTED') {
                  core.setFailed('CodeRabbit requested changes; resolve them before merging.')
                  return
                }
                core.info('CodeRabbit review accepted.')
                return
              }
              core.info(`Waiting for CodeRabbit review of ${sha}...`)
              await new Promise((r) => setTimeout(r, intervalMs))
            }
            core.setFailed(
              `Timed out after 20m waiting for CodeRabbit on ${sha}. Comment '@coderabbitai review' on the PR to retry.`
            )
