packages:
  - '.'
  - 'backend'
  - 'packages/shared'
  - 'apps/*'
  - '!apps/toss'

onlyBuiltDependencies:
  - esbuild
  - unrs-resolver
  - '@sentry/cli'
  - '@swc/core'
  - protobufjs
  - '@nestjs/core'

overrides:
  esbuild: '>=0.28.1'
  # @heejun/eslint-config 가 끌어오는 eslint-plugin-boundaries 의 전이 의존
  # handlebars(<=4.7.8) 취약점 패치(devDeps 전용, 빌드 산출물 미포함).
  handlebars: '>=4.7.9'
  multer: '>=2.2.0'
  ws: '>=8.21.0'
  form-data: '>=4.0.6'

allowBuilds:
  '@nestjs/core': true
  '@scarf/scarf': false
  '@sentry/cli': true
  '@swc/core': true
  esbuild: true
  protobufjs: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@types/node@25.9.3'
  - 'esbuild@0.28.1'
  - '@heejun/eslint-config@4.0.0'
  - '@heejun/prettier-config@3.0.0'
