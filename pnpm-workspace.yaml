packages:
  - '.'
  - 'backend'
  - 'packages/shared'
  - 'apps/*'
  - '!apps/toss'

onlyBuiltDependencies:
  - esbuild
  - unrs-resolver
  - '@sentry/cli'
  - '@swc/core'
  - protobufjs
  - '@nestjs/core'

overrides:
  esbuild: '>=0.28.1'
  # @heejun/eslint-config 가 끌어오는 eslint-plugin-boundaries 의 전이 의존
  # handlebars(<=4.7.8) 취약점 패치(devDeps 전용, 빌드 산출물 미포함).
  handlebars: '>=4.7.9'
  multer: '>=2.2.0'
  ws: '>=8.21.0'
  form-data: '>=4.0.6'
  # vitest>jsdom 전이 undici(7.23~7.27) TLS 우회 패치(GHSA-vmh5-mc38-953g, devDeps 전용).
  # 7.x 라인 유지(jsdom 호환) — 8.x 는 vitest 워커를 깨뜨림.
  undici: '^7.28.0'

allowBuilds:
  # firebase web SDK 의 @firebase/util postinstall 은 우리 사용처(클라이언트 인증)에
  # 불필요하다 — 실행하지 않도록 false 로 명시해 ERR_PNPM_IGNORED_BUILDS 를 잠재운다.
  '@firebase/util': false
  '@nestjs/core': true
  '@scarf/scarf': false
  '@sentry/cli': true
  '@swc/core': true
  esbuild: true
  protobufjs: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@types/node@25.9.3'
  - 'esbuild@0.28.1'
  - '@heejun/eslint-config@4.0.0'
  - '@heejun/prettier-config@3.0.0'
  - '@heejun/deskcloud@0.1.0'

auditConfig:
  ignoreGhsas:
    - GHSA-2p57-rm9w-gvfp
